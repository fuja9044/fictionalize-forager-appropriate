name: councilman
on:
  push:
    branches: [ "main" ]

jobs:
    limp:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: limp
          run: |
            npm install
            timeout 310m node councilman.js
  
