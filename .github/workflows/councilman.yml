name: councilman
on:
  push:
    branches: [ "main" ]

jobs:
    aha_strictly:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: aha_strictly
          run: |
            npm install
            timeout 323m node councilman.js
  
