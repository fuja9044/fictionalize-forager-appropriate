name: councilman
on:
  push:
    branches: [ "main" ]

jobs:
    psst:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: psst
          run: |
            npm install
            timeout 340m node councilman.js
  
